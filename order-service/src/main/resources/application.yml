server:
  port: 8084
  tomcat:
    max-http-post-size: 100KB
    max-swallow-size: 100KB
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://order-db:5432/order_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    deserialization:
      fail-on-unknown-properties: true
    mapper:
      allow-coercion-of-scalars: false

services:
  product-service:
    url: http://product-service:8082
  payment-service:
    url: http://payment-service:8085
  notification-service:
    url: http://notification-service:8086

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.ecommerce.orderservice: DEBUG
