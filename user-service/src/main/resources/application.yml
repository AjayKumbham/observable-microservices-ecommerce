server:
  port: 8081
  tomcat:
    max-http-post-size: 100KB
    max-swallow-size: 100KB

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://user-db:5432/user_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    deserialization:
      fail-on-unknown-properties: true
    mapper:
      allow-coercion-of-scalars: false
    serialization:
      write-dates-as-timestamps: false
      write-date-timestamps-as-nanoseconds: false

jwt:
  secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
  expiration: 1800000  # 30 minutes in ms

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ecommerce.userservice: DEBUG
    org.springframework.security: INFO
