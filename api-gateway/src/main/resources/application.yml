server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # User Service routes - public auth endpoints bypass JWT filter
        - id: user-service-auth
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        # User Service routes - protected profile endpoints
        - id: user-service-users
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0
            - AuthenticationFilter

        # Product Service routes
        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/v1/products/**,/api/v1/categories/**
          filters:
            - StripPrefix=0
            - AuthenticationFilter

        # Cart Service routes
        - id: cart-service
          uri: http://cart-service:8083
          predicates:
            - Path=/api/v1/cart/**
          filters:
            - StripPrefix=0
            - AuthenticationFilter

        # Order Service routes
        - id: order-service
          uri: http://order-service:8084
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0
            - AuthenticationFilter

        # Payment Service routes
        - id: payment-service
          uri: http://payment-service:8085
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=0
            - AuthenticationFilter

        # OpenAPI Docs Proxy Routes
        - id: openapi-user
          uri: http://user-service:8081
          predicates:
            - Path=/v3/api-docs/user-service
          filters:
            - RewritePath=/v3/api-docs/user-service, /v3/api-docs
        - id: openapi-product
          uri: http://product-service:8082
          predicates:
            - Path=/v3/api-docs/product-service
          filters:
            - RewritePath=/v3/api-docs/product-service, /v3/api-docs
        - id: openapi-cart
          uri: http://cart-service:8083
          predicates:
            - Path=/v3/api-docs/cart-service
          filters:
            - RewritePath=/v3/api-docs/cart-service, /v3/api-docs
        - id: openapi-order
          uri: http://order-service:8084
          predicates:
            - Path=/v3/api-docs/order-service
          filters:
            - RewritePath=/v3/api-docs/order-service, /v3/api-docs
        - id: openapi-payment
          uri: http://payment-service:8085
          predicates:
            - Path=/v3/api-docs/payment-service
          filters:
            - RewritePath=/v3/api-docs/payment-service, /v3/api-docs
        - id: openapi-notification
          uri: http://notification-service:8086
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - RewritePath=/v3/api-docs/notification-service, /v3/api-docs

      default-filters:
        - AddResponseHeader=X-Gateway-Source, api-gateway
        - AddResponseHeader=X-Content-Type-Options, nosniff

  # Global CORS for all routes
  webflux:
    cors:
      enabled: true

jwt:
  secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
  expiration: 86400000  # 24 hours in ms

springdoc:
  api-docs:
    version: openapi_3_0
  swagger-ui:
    urls:
      - name: User Service
        url: /v3/api-docs/user-service
      - name: Product Service
        url: /v3/api-docs/product-service
      - name: Cart Service
        url: /v3/api-docs/cart-service
      - name: Order Service
        url: /v3/api-docs/order-service
      - name: Payment Service
        url: /v3/api-docs/payment-service
      - name: Notification Service
        url: /v3/api-docs/notification-service

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.ecommerce.gateway: DEBUG
