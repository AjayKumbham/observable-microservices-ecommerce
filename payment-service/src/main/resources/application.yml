server:
  port: 8085
  tomcat:
    max-http-post-size: 20KB
    max-swallow-size: 20KB

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://payment-db:5432/payment_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    deserialization:
      fail-on-unknown-properties: true
    mapper:
      allow-coercion-of-scalars: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.ecommerce.paymentservice: DEBUG
